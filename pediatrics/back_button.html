<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Назад в меню</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 6px; /* Небольшой отступ для тени при наведении */
            background-color: transparent; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: flex-start;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #ffffff;
            color: #0f172a;
            border: 1px solid #94a3b8;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            box-shadow: none !important;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            box-sizing: border-box;
        }

        .back-btn svg {
            transition: transform 0.2s ease-in-out, color 0.2s ease-in-out;
            color: #64748b;
        }

        .back-btn:hover {
            background-color: #eef2ff;
            border-color: #2563eb;
            color: #2563eb;
            box-shadow: none !important;
            transform: translateY(-2px);
        }

        .back-btn:hover svg {
            color: #2563eb;
            transform: scale(1.1) translateX(-2px);
        }
        
        .back-btn:active {
            transform: translateY(0);
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <!-- target="_top" нужен, чтобы ссылка открывалась в главном окне, а не внутри iframe -->
    <a href="https://e.kazangmu.ru/course/view.php?id=3631" target="_top" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        На главную
    </a>
</body>
</html>
